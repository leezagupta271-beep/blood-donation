{% extends "base.html" %}

{% block title %}Login | Blood Donate App{% endblock %}

{% block content %}
<section class="form-section">
    <div class="form-container">
        <h2>Welcome Back</h2>
        <p class="form-subtitle">Securely access your lifesaver dashboard</p>
        <form id="loginForm">
            <div class="form-group">
                <label for="loginEmail">Email Address</label>
                <div class="input-with-icon">
                    <i data-feather="mail"></i>
                    <input type="email" id="loginEmail" required placeholder="john@example.com">
                </div>
            </div>
            <div class="form-group">
                <label for="loginPassword">Password</label>
                <div class="input-with-icon">
                    <i data-feather="lock"></i>
                    <input type="password" id="loginPassword" required placeholder="••••••••">
                </div>
            </div>
            <button type="submit" class="btn primary-btn btn-full" style="margin-top: 1rem;">Sign In to Dashboard</button>
            <div class="form-switch">
                Don't have an account? <a href="{{ url_for('register_page') }}">Register here</a>
            </div>
        </form>
    </div>
</section>
{% endblock %}
